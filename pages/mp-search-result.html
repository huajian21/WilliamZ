<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>纳里 · 物品筛选</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<script src="../assets/store.js"></script>
<style>
  /* 搜索栏 */
  .search-top { display: flex; align-items: center; gap: 12px; padding: 4px 24px 14px; }
  .search-input-wrap {
    flex: 1; height: 40px; border: 1px solid var(--line-2); border-radius: var(--r-md);
    display: flex; align-items: center; gap: 10px; padding: 0 14px; background: var(--paper);
    transition: border-color 0.2s;
  }
  .search-input-wrap:focus-within { border-color: var(--indigo); }
  .search-input-wrap input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; color: var(--sumi); font-family: var(--font-sans); }
  .search-input-wrap input::placeholder { color: var(--sumi-3); }
  .search-cancel { font-size: 13px; color: var(--sumi-2); text-decoration: none; flex-shrink: 0; }

  /* 筛选来源标签(从房间/家具进来时显示) */
  .filter-source {
    margin: 0 24px 12px; padding: 10px 14px;
    background: var(--washi-2); border-left: 3px solid var(--indigo);
    border-radius: var(--r-sm);
    display: flex; align-items: center; gap: 10px;
  }
  .filter-source .fs-icon { color: var(--indigo); font-size: 14px; }
  .filter-source .fs-text { flex: 1; font-size: 12px; color: var(--sumi-2); }
  .filter-source .fs-text strong { color: var(--sumi); font-family: var(--font-serif); }
  .filter-source .fs-clear { font-size: 11px; color: var(--sumi-3); cursor: pointer; text-decoration: underline; }

  /* 结果标题(同物品页/房间页标题) */
  .list-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin: 0 24px; padding-bottom: 10px;
  }
  .list-head .lh-left { display: flex; align-items: baseline; gap: 10px; }
  .list-head .lhtitle { font-family: var(--font-serif); font-size: 15px; font-weight: 700; color: var(--sumi); letter-spacing: 2px; }
  .list-head .lhcount { font-size: 11px; color: var(--sumi-3); }
  .list-head .lhcount strong { font-family: var(--font-serif); color: var(--indigo); font-weight: 700; }
  .list-head .sort-btn { font-size: 11px; color: var(--sumi-2); cursor: pointer; }
  .list-head .sort-btn strong { color: var(--sumi); font-family: var(--font-serif); }

  /* 空状态 */
  .empty-state { padding: 50px 24px; text-align: center; color: var(--sumi-3); }
  .empty-state .emoji { font-size: 40px; opacity: 0.4; margin-bottom: 14px; }
  .empty-state .title { font-family: var(--font-serif); font-size: 15px; color: var(--sumi-2); margin-bottom: 6px; }
  .empty-state .desc { font-size: 12px; }
</style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>纳里 📶 100%</span></div>

    <div class="scroll">
      <!-- 搜索栏 -->
      <div class="search-top">
        <a class="back-btn" href="mp-home.html" style="font-size: 20px; text-decoration: none; color: var(--sumi);">‹</a>
        <div class="search-input-wrap">
          <span style="color: var(--sumi-3); font-size: 14px;">⌕</span>
          <input type="text" id="searchInput" placeholder="搜索物品名称" autofocus>
        </div>
        <a class="search-cancel" href="mp-home.html">取消</a>
      </div>

      <!-- 筛选来源标签(从房间/家具进来时显示) -->
      <div class="filter-source" id="filterSource" style="display:none;">
        <span class="fs-icon">📍</span>
        <span class="fs-text" id="filterText">筛选中</span>
        <span class="fs-clear" onclick="clearFilter()">清除筛选 ✕</span>
      </div>

      <!-- 结果标题 -->
      <div class="list-head">
        <div class="lh-left">
          <div class="lhtitle" id="listTitle">搜索结果</div>
          <div class="lhcount">共 <strong id="itemCount">0</strong> 件</div>
        </div>
        <span class="sort-btn">排序：<strong>最近添加</strong> ▾</span>
      </div>

      <!-- 物品列表(JS 渲染) -->
      <div class="section" style="margin: 0 24px;" id="itemList"></div>

      <div style="height: 20px;"></div>
    </div>

    <div class="tabs">
      <a class="tab" href="mp-home.html"><span class="tkanji">首页</span><span class="tdot"></span></a>
      <a class="tab active" href="mp-browse.html"><span class="tkanji">物品</span><span class="tdot"></span></a>
      <a class="tab" href="mp-place.html"><span class="tkanji">房间</span><span class="tdot"></span></a>
      <a class="tab" href="mp-profile.html"><span class="tkanji">我的</span><span class="tdot"></span></a>
    </div>
  </div>

  <script>
    DB.init();
    const srPlace = DB.getCurrentPlace();
    const srCats = DB.getCategories(srPlace.id);

    const params = new URLSearchParams(location.search);
    const kw = params.get('kw') || params.get('q') || '';
    const filterRoom = params.get('room') || '';
    const filterFurnId = params.get('furnId') || '';
    const filterCatId = params.get('catId') || '';

    let currentItems = [];

    function applyFilter() {
      currentItems = DB.getItems(srPlace.id);
      const titleEl = document.getElementById('listTitle');
      const srcEl = document.getElementById('filterSource');
      const srcText = document.getElementById('filterText');
      const inputVal = document.getElementById('searchInput').value.trim();

      // 关键词
      if (inputVal) {
        currentItems = currentItems.filter(i =>
          i.name.toLowerCase().includes(inputVal.toLowerCase()) ||
          (i.categoryName || '').toLowerCase().includes(inputVal.toLowerCase())
        );
      }
      // 家具筛选
      if (filterFurnId) {
        currentItems = currentItems.filter(i => i.furnitureId === filterFurnId);
        const furn = DB.getFurnitures(srPlace.id).find(f => f.id === filterFurnId);
        const room = furn ? DB.getRooms(srPlace.id).find(r => r.id === furn.roomId) : null;
        titleEl.textContent = (room ? room.name + ' · ' : '') + (furn ? furn.name : '');
        srcEl.style.display = 'flex';
        srcText.innerHTML = '📍 <strong>' + (room ? room.name + ' / ' : '') + (furn ? furn.name : '') + '</strong> 的物品';
      } else if (filterCatId) {
        // 分类筛选（含子分类）
        const cat = srCats.find(c => c.id === filterCatId);
        const subIds = cat ? DB.getSubCategories(cat.id).map(s => s.id) : [];
        currentItems = currentItems.filter(i => i.categoryId === filterCatId || subIds.includes(i.categoryId));
        titleEl.textContent = cat ? cat.name : '分类';
        srcEl.style.display = 'flex';
        srcText.innerHTML = '🏷 <strong>' + (cat ? cat.name : '') + '</strong> 分类的物品';
      } else if (filterRoom) {
        currentItems = currentItems.filter(i => i.locationPath && i.locationPath.startsWith(filterRoom));
        titleEl.textContent = filterRoom;
        srcEl.style.display = 'flex';
        srcText.innerHTML = '📍 <strong>' + filterRoom + '</strong> 的所有物品';
      } else {
        titleEl.textContent = inputVal ? '搜索"' + inputVal + '"' : '全部物品';
        srcEl.style.display = 'none';
      }

      render();
    }

    function render() {
      const list = document.getElementById('itemList');
      document.getElementById('itemCount').textContent = currentItems.length;
      if (currentItems.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><div class="title">没有找到物品</div><div class="desc">试试换个关键词或清除筛选</div></div>';
        return;
      }
      list.innerHTML = currentItems.map(i => `
        <a class="item-row" href="mp-item-detail.html?id=${i.id}">
          <img src="${i.photos[0] || 'https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?w=200'}" onerror="this.src='https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?w=200'" alt="${i.name}">
          <div class="info"><div><span class="iname">${i.name}</span></div></div>
          <div class="iqty">${i.locationPath || '未定位'}</div>
        </a>
      `).join('');
    }

    function clearFilter() {
      location.href = location.pathname;
    }

    document.getElementById('searchInput').value = kw;
    document.getElementById('searchInput').addEventListener('input', applyFilter);
    applyFilter();
  </script>
</body>
</html>
