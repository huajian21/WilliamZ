<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>场所图标预览</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  body { display: flex; justify-content: center; padding: 40px 20px; }
  .preview { max-width: 420px; width: 100%; }
  .preview-head {
    font-family: var(--font-serif); font-size: 18px; color: var(--sumi);
    font-weight: 700; margin-bottom: 8px;
  }
  .preview-sub { font-size: 12px; color: var(--sumi-3); margin-bottom: 24px; }
  .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
  .icon-card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 20px 12px; text-align: center;
  }
  .icon-card .ic-svg {
    width: 40px; height: 40px; color: var(--sumi); display: block; margin: 0 auto 10px;
  }
  .icon-card .ic-name {
    font-family: var(--font-serif); font-size: 13px; color: var(--sumi); font-weight: 700;
  }
  .icon-card .ic-type { font-size: 10px; color: var(--sumi-3); margin-top: 3px; }

  .size-row { display: flex; align-items: flex-end; gap: 20px; justify-content: center; padding: 24px; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); margin-bottom: 20px; }
  .size-item { text-align: center; }
  .size-item svg { color: var(--sumi); display: block; margin: 0 auto 6px; }
  .size-item .sz { font-size: 10px; color: var(--sumi-3); }

  .color-row { display: flex; gap: 16px; justify-content: center; padding: 20px; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); }
  .color-item { text-align: center; }
  .color-item svg { display: block; margin: 0 auto 6px; }
  .color-item .cl { font-size: 10px; }
</style>
</head>
<body>
  <div class="preview">
    <div class="preview-head">场所图标 · A2 木质日式</div>
    <div class="preview-sub">fill 实心风格 SVG，24×24 viewBox，墨色 #2A2723，三图标统一</div>

    <!-- 三个图标 -->
    <div class="icon-grid">
      <div class="icon-card">
        <svg class="ic-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5L2 10.8v.7h2v8.5c0 .6.4 1 1 1h5v-5c0-.6.4-1 1-1h2c.6 0 1 .4 1 1v5h5c.6 0 1-.4 1-1v-8.5h2v-.7L12 2.5zm0-2L23 9.5H1L12 .5z"/></svg>
        <div class="ic-name">家</div>
        <div class="ic-type">home</div>
      </div>
      <div class="icon-card">
        <svg class="ic-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17v-5c0-1.1.9-2 2-2h10c1.1 0 2.1.5 2.7 1.4l2 2.8c.2.3.3.6.3.9V17h1c.6 0 1 .4 1 1s-.4 1-1 1h-1.3c-.5-1.8-2.1-3-3.9-3s-3.4 1.2-3.9 3H8.9c-.5-1.8-2.1-3-3.9-3s-3.4 1.2-3.9 3H2c-.6 0-1-.4-1-1V12c0-.6.4-1 1-1h1v-1c0-.6.4-1 1-1V5c0-.6.4-1 1-1h6c.6 0 1 .4 1 1v4h2V4c0-.6.4-1 1-1h3.5c1.3 0 2.5.7 3.1 1.8L20.5 9c.3.5.5 1.1.5 1.7V17h-.5zM5 14h5V8H5v6zM6 20.5c1.4 0 2.5-1.1 2.5-2.5S7.4 15.5 6 15.5 3.5 16.6 3.5 18 4.6 20.5 6 20.5zm12 0c1.4 0 2.5-1.1 2.5-2.5s-1.1-2.5-2.5-2.5S15.5 16.6 15.5 18s1.1 2.5 2.5 2.5z"/></svg>
        <div class="ic-name">房车</div>
        <div class="ic-type">rv · van</div>
      </div>
      <div class="icon-card">
        <svg class="ic-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 8H4c-.6 0-1 .4-1 1v2c0 .6.4 1 1 1h1v8c0 .6.4 1 1 1h12c.6 0 1-.4 1-1v-8h1c.6 0 1-.4 1-1V9c0-.6-.4-1-1-1zM9 17H7v-5h2v5zm4 0h-2v-5h2v5zm4 0h-2v-5h2v5zM5 7h14c.6 0 1-.4 1-1V5c0-.6-.4-1-1-1H5c-.6 0-1 .4-1 1v1c0 .6.4 1 1 1z"/></svg>
        <div class="ic-name">工作室</div>
        <div class="ic-type">studio</div>
      </div>
    </div>

    <!-- 尺寸适配 -->
    <div class="preview-sub" style="margin-bottom:12px;">多尺寸适配（16 / 20 / 28 / 40px）</div>
    <div class="size-row">
      <div class="size-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 L12 4 L21 11.5"/><path d="M5 10.5 L5 20 L19 20 L19 10.5"/><path d="M10 20 L10 14.5 L14 14.5 L14 20"/><path d="M17 6.5 L17 4 L19 4 L19 8.3"/></svg><span class="sz">16</span></div>
      <div class="size-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 L12 4 L21 11.5"/><path d="M5 10.5 L5 20 L19 20 L19 10.5"/><path d="M10 20 L10 14.5 L14 14.5 L14 20"/><path d="M17 6.5 L17 4 L19 4 L19 8.3"/></svg><span class="sz">20</span></div>
      <div class="size-item"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 L12 4 L21 11.5"/><path d="M5 10.5 L5 20 L19 20 L19 10.5"/><path d="M10 20 L10 14.5 L14 14.5 L14 20"/><path d="M17 6.5 L17 4 L19 4 L19 8.3"/></svg><span class="sz">28</span></div>
      <div class="size-item"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 L12 4 L21 11.5"/><path d="M5 10.5 L5 20 L19 20 L19 10.5"/><path d="M10 20 L10 14.5 L14 14.5 L14 20"/><path d="M17 6.5 L17 4 L19 4 L19 8.3"/></svg><span class="sz">40</span></div>
    </div>

    <!-- 配色 -->
    <div class="preview-sub" style="margin-bottom:12px;">配色适配</div>
    <div class="color-row">
      <div class="color-item"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2A2723" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 L12 4 L21 11.5"/><path d="M5 10.5 L5 20 L19 20 L19 10.5"/><path d="M10 20 L10 14.5 L14 14.5 L14 20"/><path d="M17 6.5 L17 4 L19 4 L19 8.3"/></svg><span class="cl" style="color:#2A2723">墨色</span></div>
      <div class="color-item"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#345C5C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 L12 4 L21 11.5"/><path d="M5 10.5 L5 20 L19 20 L19 10.5"/><path d="M10 20 L10 14.5 L14 14.5 L14 20"/><path d="M17 6.5 L17 4 L19 4 L19 8.3"/></svg><span class="cl" style="color:#345C5C">铁锈青</span></div>
      <div class="color-item"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#A0522D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 L12 4 L21 11.5"/><path d="M5 10.5 L5 20 L19 20 L19 10.5"/><path d="M10 20 L10 14.5 L14 14.5 L14 20"/><path d="M17 6.5 L17 4 L19 4 L19 8.3"/></svg><span class="cl" style="color:#A0522D">弁柄红</span></div>
      <div class="color-item"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#A8A296" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 L12 4 L21 11.5"/><path d="M5 10.5 L5 20 L19 20 L19 10.5"/><path d="M10 20 L10 14.5 L14 14.5 L14 20"/><path d="M17 6.5 L17 4 L19 4 L19 8.3"/></svg><span class="cl" style="color:#A8A296">浅墨</span></div>
    </div>
  </div>
</body>
</html>
